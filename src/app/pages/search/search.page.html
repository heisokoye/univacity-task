<!-- 
  ======================================================
  Search Page Template
  Serving as the primary home screen, showing lists of programs and their basic details.
  ======================================================
-->
<!-- Header with hidden border for a clean, seamless look against the body content -->
<ion-header class="ion-no-border">
  <div class="custom-header-container">

    <!-- Top row: Contains back button and dynamic mockup search box -->
    <div class="top-search-row">
      <ion-button fill="clear" class="back-btn" (click)="goBack()">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>

      <div class="search-input-wrapper">
        <div class="text-container">
          <div class="label">What do you want to study?</div>
          <div class="value">Computer Technologies</div>
        </div>
        <ion-icon name="chevron-down-outline"></ion-icon>
      </div>
    </div>

    <!-- Sort / Filter action bar -->
    <div class="action-bar">
      <div class="action-item" (click)="openSort()">
        <!-- Lucide lucide-list-filter -->
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 5h20"/>
          <path d="M6 12h12"/>
          <path d="M9 19h6"/>
        </svg>
        <span>Sort</span>
      </div>

      <div class="action-item" (click)="openFilter()">
        <!-- Lucide lucide-funnel -->
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 20a1 1 0 0 0 .553.895l2 1A1 1 0 0 0 14 21v-7a2 2 0 0 1 .517-1.341L21.74 4.67A1 1 0 0 0 21 3H3a1 1 0 0 0-.742 1.67l7.225 7.989A2 2 0 0 1 10 14z"/>
        </svg>
        <span>Filter</span>
        <span class="notification-badge">{{ activeFilterCount }}</span>
      </div>
    </div>

    <!-- Active filter chips -->
    <div class="chips-scroll-area">
      <div class="chip" *ngFor="let f of activeFilters" (click)="removeFilter(f)">
        {{ f }}
        <ion-icon name="close-outline"></ion-icon>
      </div>
    </div>

  </div>
</ion-header>

<ion-content>
  <div class="content-padding">
    <h2 class="results-title">Search result</h2>

    <div class="cards-list">
      <div class="univ-card" *ngFor="let p of programs" [routerLink]="['/program-detail', p.id]">

        <!-- Image section -->
        <div class="image-box">
          <div class="top-notch"></div>

          <img src="assets/imgs/university.webp" class="card-img" [alt]="p.university"/>
          <!-- Official Partner badge -->
          <div class="partner-badge" *ngIf="p.isOfficial">
            <ion-icon name="checkmark-circle"></ion-icon>
            Official Partner
          </div>

          <!-- University logo -->
          <div class="logo-box">
            <img src="assets/imgs/logo.png" [alt]="p.university + ' logo'"/>          </div>
        </div>

        <!-- Card body -->
        <div class="card-body">

          <!-- Program title — full width -->
          <h3 class="program-title">{{ p.title }}</h3>

          <!-- University name -->
          <div class="uni-name">
            <ion-icon name="checkmark-circle"></ion-icon>
            {{ p.university }}
          </div>

          <!-- Info grid: 2×2 -->
          <div class="info-grid">

            <!-- Country with Canada flag -->
            <div class="grid-item">
              <!-- Canada flag SVG -->
              <svg class="flag-icon" viewBox="0 0 16 11" xmlns="http://www.w3.org/2000/svg">
                <rect width="16" height="11" fill="#fff"/>
                <rect width="4" height="11" fill="#d52b1e"/>
                <rect x="12" width="4" height="11" fill="#d52b1e"/>
                <path d="M8,1.8 L8.6,3.2 L10.2,3 L9,4.2 L10.2,4.8 L8,4.2 L8,7 L7.5,7 L7.5,4.2 L5.4,4.8 L6.6,4.2 L5.4,3 L7,3.2 Z" fill="#d52b1e"/>
              </svg>
              {{ p.location }}
            </div>

            <!-- Level -->
            <div class="grid-item">
              <ion-icon name="ribbon-outline"></ion-icon>
              {{ p.level }}
            </div>

            <!-- Attendance -->
            <div class="grid-item">
              <ion-icon name="time-outline"></ion-icon>
              {{ p.attendance }}
            </div>

            <!-- Duration -->
            <div class="grid-item">
              <ion-icon name="time-outline"></ion-icon>
              {{ p.duration }}
            </div>

          </div>

          <!-- Language -->
          <div class="language-row">
            <ion-icon name="language-outline"></ion-icon>
            {{ p.language }}
          </div>

          <!-- Footer: price + actions -->
          <div class="card-footer">
            <span class="price">€{{ p.tuitionFee }}/per semester</span>

            <div class="footer-actions">
              <ion-icon name="share-social-outline" (click)="share(p)"></ion-icon>
              <ion-icon
                [name]="p.liked ? 'heart' : 'heart-outline'"
                [class.liked]="p.liked"
                (click)="toggleLike(p)">
              </ion-icon>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>
</ion-content>
